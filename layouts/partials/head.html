<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- content= " ... , viewport-fit=cover" for immersive fullscreen experience -->
<title>{{ .Title }}</title>
<meta name="description" content="{{ .Description }}" />
<link rel="icon" href="{{ "assets/images/logo_square.png" | relURL }}" type="image/png" />
<link rel="apple-touch-icon" href="{{ "assets/images/logo_square.png" | relURL }}" />
{{ range .Translations }}
<link rel="alternate" hreflang="{{ .Site.Language.Lang }}" href="{{ .Permalink }}" />
{{ end }}
<link rel="alternate" hreflang="{{ .Site.Language.Lang }}" href="{{ .Permalink }}" />
{{ if eq .Site.Language.Lang "id" }}
<link rel="alternate" hreflang="x-default" href="{{ .Permalink }}" />
{{ else }}
<link rel="alternate" hreflang="x-default" href="{{ (index .Translations 0).Permalink }}" />
{{ end }}
