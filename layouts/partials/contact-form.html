<div class="contact-form-panel">
    <div class="section-label">{{ i18n "contact_form_section_label" | safeHTML }}</div>
    <h2>{{ i18n "contact_form_text_h2" | safeHTML }}</h2>
    <!-- Formspree handling 
    <form id="contact-form" class="form-dark" action="https://formspree.io/f/mgodkleb" method="POST">
    -->
    <!-- StaticForms handling -->
    <form id="contact-form" class="form-dark" action="https://api.staticforms.dev/submit" method="POST">
        <input  type="hidden" 
                name="apiKey" 
                value="sf_86c03cde70d237ccc43d0880" />
        <input  type="hidden" 
                name="subject" 
                value="SmartRisk submission" />
        <div class="form-group">
            <label for="field-name">{{ i18n "contact_form_name_01" | safeHTML }}</label>
            <input type="text" id="field-name" name="name" placeholder='{{ i18n "contact_form_placeholder_01" | safeHTML }}' required aria-required="true" />
        </div>
        <div class="form-group">
            <label for="field-company">{{ i18n "contact_form_name_02" | safeHTML }}</label>
            <input type="text" id="field-company" name="company" placeholder='{{ i18n "contact_form_placeholder_02" | safeHTML }}' required aria-required="true" />
        </div>
        <div class="form-group">
            <label for="field-email">{{ i18n "contact_form_name_03" | safeHTML }}</label>
            <input type="email" id="field-email" name="email" placeholder='{{ i18n "contact_form_placeholder_03" | safeHTML }}' required aria-required="true" />
        </div>
        <div class="form-group">
            <label for="field-service">{{ i18n "contact_form_name_04" | safeHTML }}</label>
            <select id="field-service" name="service">
                <option value="">{{ i18n "contact_form_options_title" | safeHTML }}</option>
                <option>{{ i18n "contact_form_option_01" | safeHTML }}</option>
                <option>{{ i18n "contact_form_option_02" | safeHTML }}</option>
                <option>{{ i18n "contact_form_option_03" | safeHTML }}</option>
                <option>{{ i18n "contact_form_option_04" | safeHTML }}</option>
                <option>{{ i18n "contact_form_option_05" | safeHTML }}</option>
                <option>{{ i18n "contact_form_option_06" | safeHTML }}</option>
                <option>{{ i18n "contact_form_option_07" | safeHTML }}</option>
            </select>
        </div>
        <div class="form-group">
            <label for="field-message">{{ i18n "contact_form_name_05" | safeHTML }}</label>
            <textarea id="field-message" name="message" placeholder='{{ i18n "contact_form_placeholder_05" | safeHTML }}'></textarea>
        </div>
        <input type="text" name="_gotcha" style="display:none" />
        <p id="form-status" aria-live="polite" aria-atomic="true"></p>
        <button type="submit" id="submit-btn" class="btn btn-submit">{{ i18n "contact_form_submit" | safeHTML }}</button>
    </form>
</div>
