<div class="contact-form-panel">
    {{ if eq .Site.Language.Lang "en" }}
    <div class="section-label">Get in Touch</div>
    <h2>Send a <em>Message</em></h2>
    <form id="contact-form" class="form-dark" action="https://formspree.io/f/mgodkleb" method="POST">
        <div class="form-group">
            <label for="field-name">Full Name</label>
            <input type="text" id="field-name" name="name" placeholder="Your Name" required aria-required="true" />
        </div>
        <div class="form-group">
            <label for="field-company">Company / Organization</label>
            <input type="text" id="field-company" name="company" placeholder="Company / Organization Name" required aria-required="true" />
        </div>
        <div class="form-group">
            <label for="field-email">Email Address</label>
            <input type="email" id="field-email" name="email" placeholder="your@email.com" required aria-required="true" />
        </div>
        <div class="form-group">
            <label for="field-service">Service of Interest</label>
            <select id="field-service" name="service">
                <option value="">Select a service...</option>
                <option>Operational Risk Assessment</option>
                <option>Project Risk Assessment</option>
                <option>Asset Valuation</option>
                <option>Insurance &amp; Risk Planning</option>
                <option>HSE Management</option>
                <option>Business Continuity &amp; Resilience</option>
                <option>Other / General Inquiry</option>
            </select>
        </div>
        <div class="form-group">
            <label for="field-message">Message</label>
            <textarea id="field-message" name="message" placeholder="Briefly describe your project or inquiry"></textarea>
        </div>
        <input type="text" name="_gotcha" style="display:none" />
        <p id="form-status" aria-live="polite" aria-atomic="true"></p>
        <button type="submit" id="submit-btn" class="btn btn-submit">Send Inquiry</button>
    </form>
    
    {{ else }}
    <div class="section-label">Hubungi Kami</div>
    <h2>Kirim <em>Pesan</em></h2>
    <form id="contact-form" class="form-dark" action="https://formspree.io/f/mgodkleb" method="POST">
        <div class="form-group">
            <label for="field-name">Nama Lengkap</label>
            <input type="text" id="field-name" name="name" placeholder="Nama Anda" required aria-required="true" />
        </div>
        <div class="form-group">
            <label for="field-company">Perusahaan / Organisasi</label>
            <input type="text" id="field-company" name="company" placeholder="Nama Perusahaan / Organisasi" required aria-required="true" />
        </div>
        <div class="form-group">
            <label for="field-email">Alamat Email</label>
            <input type="email" id="field-email" name="email" placeholder="email@anda.com" required aria-required="true" />
        </div>
        <div class="form-group">
            <label for="field-service">Layanan yang Diminati</label>
            <select id="field-service" name="service">
                <option value="">Pilih layanan...</option>
                <option>Penilaian Risiko Operasional</option>
                <option>Penilaian Risiko Proyek</option>
                <option>Valuasi Aset</option>
                <option>Manajemen Risiko &amp; Perencanaan Asuransi</option>
                <option>Manajemen K3</option>
                <option>Kelangsungan &amp; Ketahanan Bisnis</option>
                <option>Lainnya / Pertanyaan Umum</option>
            </select>
        </div>
        <div class="form-group">
            <label for="field-message">Pesan</label>
            <textarea id="field-message" name="message" placeholder="Jelaskan secara singkat proyek atau pertanyaan Anda"></textarea>
        </div>
        <input type="text" name="_gotcha" style="display:none" />
        <p id="form-status" aria-live="polite" aria-atomic="true"></p>
        <button type="submit" id="submit-btn" class="btn btn-submit">Kirim Pesan</button>
    </form>
    {{ end }}
</div>
