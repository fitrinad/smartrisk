<!---------- FOOTER ---------->
<footer>
    {{ if not .Params.hasContactSection }}
        {{ partial "contact-details.html" . }}
    {{ end }}
    <span class="footer-logo">
        <picture>
            <source srcset="{{ "assets/images/smartrisk_white.webp" | relURL }}" type="image/webp" />
            <img src="{{ "assets/images/smartrisk_white.png" | relURL }}" alt="SmartRisk footer logo" />
        </picture>
    </span>
    <p>
        © 2026 PT Solusi Manajemen Risiko Terintegrasi. {{ i18n "footer_copyright" | safeHTML }}
    </p>
    <p>
        <a href="https://smartrisk-pln.com" style="color:inherit">smartrisk-pln.com</a>
    </p>
</footer>
