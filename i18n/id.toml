[about_section_label]
other = "Tentang SmartRisk"
[about_h2]
other = "Suara <em>independen</em> dalam ranah risiko yang kompleks"

[about_body_p01]
other = "PT Solusi Manajemen Risiko Terintegrasi (SmartRisk) didirikan pada Maret 2020 sebagai perusahaan <i lang='EN'>joint venture</i>, dimiliki 90% oleh YPK PLN dan 10% oleh PT Solusi Manajemen Risiko Terpadu (Smart). Kami memberikan layanan konsultasi risiko yang bebas dari konflik kepentingan asuransi atau broker."
[about_body_p02]
other = "Berkantor pusat di Jakarta dan berafiliasi dengan YPK-PLN, kami membawa pengalaman mendalam di sektor energi, utilitas, pertambangan, dan infrastruktur Indonesia."

