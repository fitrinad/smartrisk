#===========================#
#========== STORY ==========#
#===========================#
[story_section_label]
other = "Tentang SmartRisk"
[story_h2]
other = "Suara <em>independen</em> dalam ranah risiko yang kompleks"

[story_body_p01]
other = "PT Solusi Manajemen Risiko Terintegrasi (SmartRisk) didirikan Maret 2020 sebagai perusahaan <i lang='EN'>joint venture</i>, dimiliki 90% oleh YPK PLN dan 10% oleh PT Solusi Manajemen Risiko Terpadu (Smart). Kami memberikan konsultasi risiko yang tidak memihak, bebas dari konflik kepentingan asuransi atau broker."
[story_body_p02]
other = "Berkantor pusat di Jakarta dan berafiliasi dengan YPK-PLN, kami membawa pengalaman mendalam di sektor energi, utilitas, pertambangan, dan infrastruktur Indonesia. Tim kami memiliki sertifikasi profesional di bidang manajemen risiko, K3, asuransi, dan penilaian teknis."

[story_vision_label]
other = "Visi Kami"
[story_vision_text]
other = "Menjadi konsultan manajemen risiko independen terkemuka yang dipercaya oleh klien energi dan industri di seluruh Indonesia."

[story_mission_label]
other = "Misi Kami"
[story_mission_text]
other = "Memberikan penilaian risiko yang tepat, independen, dan dapat ditindaklanjuti untuk melindungi manusia, aset, dan lingkungan."

[story_quote_text]
other = "SmartRisk menyadari nilai mendasar dari percobaan terhadap perkiraan dan antisipasi setiap kemungkinan yang ada di dalam operasi bisnis Anda."


