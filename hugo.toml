baseURL = 'https://fitrinad.github.io/smartrisk/'
title = 'SmartRisk'

disableKinds = ['taxonomy', 'term']

defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
enableGitInfo   = true

[caches]
    [caches.images]
        dir = ':cacheDir/images'

[languages]
    [languages.en]
        languageCode = 'en'
        languageName = 'English'
        weight       = 1
        contentDir   = 'content/'
    [languages.id]
        languageCode = 'id'
        languageName = 'Bahasa Indonesia'
        weight       = 2
        contentDir   = 'content/id'

[frontmatter]
    lastmod = [":git", "lastmod", ":fileModTime"]

[outputs]
    home    = ["HTML", "sitemap"]
    section = ["HTML"]
    page    = ["HTML"]
[outputFormats.sitemap]
    mediaType       = "application/xml"
    baseName        = "sitemap"
    isPlainText     = true
    notAlternative  = true
    rel             = "sitemap"

[minify]
    minifyOutput = true
    disableHTML = false
    disableCSS = false
    disableJS = false
    disableXML = false
    [minify.tdewolff.html]
        keepComments    = false
        keepWhitespace  = false
    [minify.tdewolff.css]
        keepComments = false
    [minify.tdewolff.js]
        precision = 0
    [minify.tdewolff.xml]
        keepWhitespace = true
        keepComments = true