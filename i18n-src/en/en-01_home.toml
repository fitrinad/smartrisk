#===========================#
#========== ABOUT ==========#
#===========================#
[about_section_label]
other = "About SmartRisk"
[about_h2]
other = "An <em>independent</em> voice in a complex risk landscape"

[about_body_p01]
other = "PT Solusi Manajemen Risiko Terintegrasi (SmartRisk) was established in March 2020 as a joint venture, 90% owned by YPK PLN and 10% by PT Solusi Manajemen Risiko Terpadu. We provide unbiased, expert-led risk consulting, free from insurer or broker conflicts of interest. Our team holds professional certifications across risk management, HSE, insurance, and technical valuation."
[about_body_p02]
other = "Headquartered in Jakarta and affiliated with YPK-PLN, SmartRisk brings in-depth expertise in risk management, asset management, and operations within Indonesia's strategic industries. Our experience spans the energy, utilities, mining, and infrastructure sectors, as well as various organizations with complex risk management needs. We help organizations understand, assess, and prioritize risks to support better-informed business decisions through integrated risk management, technical valuation, and business analysis."


