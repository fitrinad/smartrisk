#==================================#
#========== CONSULTATION ==========#
#==================================#
[svc_consultation_01_title]
other = "Operational Risk Assessment"
[svc_consultation_01_desc]
other = "Systematic identification and assessment of operational hazards; including EML/PML analysis, business interruption scenarios, and GIS-based risk evaluation; tailored to each facility's scope of work."

[svc_consultation_02_title]
other = "Project Risk Assessment"
[svc_consultation_02_desc]
other = "Supporting clients in understanding construction-phase risks, applying mitigation and prevention plans to reduce insurance premium costs during project execution."

[svc_consultation_03_title]
other = "Asset Valuation"
[svc_consultation_03_desc]
other = "Independent technical valuation of industrial assets using a comprehensive industry database; including RAN, market value, and forced sale value; to optimize insurance premiums and ensure adequate coverage."

[svc_consultation_04_title]
other = "Technical Valuation"
[svc_consultation_04_desc]
other = "A systematic value-engineering approach to improve project construction efficiency by analyzing component functions and replacing high-cost, low-value elements without compromising safety."

[svc_consultation_05_title]
other = "Risk Management &amp; Insurance Planning"
[svc_consultation_05_desc]
other = "Reviewing risk management strategies and risk-transfer measures with independent, expert-led analysis that bridges technical and finance departments for effective insurance program design."

[svc_consultation_06_title]
other = "HSE Consultation"
[svc_consultation_06_desc]
other = "Developing and improving integrated HSE management systems, contractor safety management procedures, fire-protection planning, emergency response plans, and incident investigation support."

[svc_consultation_07_title]
other = "Business Continuity &amp; Sustainability Study"
[svc_consultation_07_desc]
other = "Implementing Business Continuity Management (BCM) systems and standards to keep operations running through natural hazards or disasters, incorporating cost-saving sustainability measures."

[svc_consultation_08_title]
other = "Disaster Risk Reduction"
[svc_consultation_08_desc]
other = "Providing end-to-end disaster risk reduction solutions, from administrative management to operational capacity-building, to ensure appropriate emergency response across all stakeholders."

[svc_consultation_09_title]
other = "Third-Party Risks &amp; Loss Control Consultation"
[svc_consultation_09_desc]
other = "Broad analysis of surrounding areas and effective mitigation measures to reduce the impact of third-party hazards arising from industrial incidents or accidents."

[svc_consultation_10_title]
other = "Business Analysis"
[svc_consultation_10_desc]
other = "Comprehensive research and studies; including customer loyalty surveys, employee engagement surveys, and field observations; forming the foundation for tailored recommendations aligned with your organization's goals."

[svc_consultation_11_title]
other = "Other Consultation Services"
[svc_consultation_11_desc]
other = "Additional services including fire and explosion risk assessment, forensic engineering investigation, HAZOP/SIL/LOPA analysis, human capital maturity assessment, and integrated performance management."


#=====================================#
#========== LEARNING CENTER ==========#
#=====================================#
[svc_learning_01_title]
other = "HSE Training"
[svc_learning_01_desc]
other = "BNSP-certified training and competency assessments covering general HSE, oil &amp; gas safety, authorized gas testing, safety inspection, HSE system management (SMK3) auditing, and incident investigation."

[svc_learning_02_title]
other = "Risk Management Training"
[svc_learning_02_desc]
other = "Training programs including enterprise risk management per ISO 31000, risk-based audit, project risk management, and business continuity per ISO 22301; with BNSP certification (CRMP &amp; CRMO)."

[svc_learning_03_title]
other = "Insurance Training"
[svc_learning_03_desc]
other = "Insurance training covering property &amp; business interruption, CAR, liability, personal accident, marine hull, and marine cargo; equipping risk management personnel with industry-specific technical knowledge."

[svc_learning_04_title]
other = "Other Training Programs"
[svc_learning_04_desc]
other = "Customized training programs tailored to client needs, including HSE leadership, behavioral-based safety, contractor safety management system (CSMS), and basic firefighting."



#=================================#
#========== IT SOLUTION ==========#
#=================================#
[svc_it_01_title]
other = "IT Project Management"
[svc_it_01_desc]
other = "End-to-end IT project management and quality assurance, including green &amp; smart building solutions, green port development, and document management systems."

[svc_it_02_title]
other = "Production House"
[svc_it_02_desc]
other = "In-house software solutions including HAZOP's and RiskGra platforms, with upcoming tools for maturity level assessment and cyber risk management."

[svc_it_03_title]
other = "Big Data"
[svc_it_03_desc]
other = "Leveraging large datasets from internet usage, smart devices, social media, and digital media to solve business challenges that were previously unmanageable."


