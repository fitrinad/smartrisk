#============================#
#========== METHOD ==========#
#============================#
[method_section_label]
other = "Cara Kerja Kami"
[method_h2]
other = "Metode <em>Interwoven</em>"
[method_p01]
other = "Metodologi kami mengintegrasikan inspeksi teknis, pemodelan risiko kuantitatif, dan pengetahuan pasar asuransi ke dalam proses manajemen risiko yang terpadu."
[method_p02]
other = "Setiap keterlibatan dipimpin oleh ahli risiko bersertifikat dan didukung tim multidisiplin insinyur, spesialis K3, dan <i lang='EN'>advisor</i> asuransi."

[method_step_01_title]
other = "Identifikasi Risiko"
[method_step_01_desc]
other = "Identifikasi bahaya secara sistematis melalui kunjungan lapangan, tinjauan dokumen, dan wawancara <i lang='EN'>stakeholder</i>."

[method_step_02_title]
other = "Analisis Risiko"
[method_step_02_desc]
other = "Penilaian kualitatif dan kuantitatif atas kemungkinan dan konsekuensi setiap risiko yang teridentifikasi."

[method_step_03_title]
other = "Evaluasi Risiko"
[method_step_03_desc]
other = "Penetapan prioritas berdasarkan <i lang='EN'>risk appetite</i> klien dan ambang batas regulasi."

[method_step_04_title]
other = "Penanganan Risiko"
[method_step_04_desc]
other = "Pengembangan rekomendasi mitigasi yang dapat ditindaklanjuti dan <i lang='EN'>roadmap</i> implementasi."

[method_step_05_title]
other = "Pemantauan &amp; Peninjauan"
[method_step_05_desc]
other = "Peninjauan dan pelaporan berkelanjutan untuk memantau <i lang='EN'>risk posture</i>."


#=====================================#
#========== MISSION PILLARS ==========#
#=====================================#
[pillars_section_label]
other = "Yang Menggerakkan Kami"
[pillars_h2]
other = "Komitmen Kami"

[pillar_01_title]
other = "Independensi"
[pillar_01_desc]
other = "Tanpa afiliasi dengan asuransi, broker, atau vendor peralatan. Saran kami hanya untuk kepentingan Anda."

[pillar_02_title]
other = "Ketelitian Teknis"
[pillar_02_desc]
other = "Setiap penilaian didukung insinyur bersertifikat dan mengikuti <i lang='EN'>risk framework</i> yang diakui secara internasional."

[pillar_03_title]
other = "Output Praktis"
[pillar_03_desc]
other = "Kami memberikan rekomendasi yang dapat ditindaklanjuti, bukan sekadar laporan. Pekerjaan kami dirancang untuk diimplementasikan."

[pillar_04_title]
other = "Kemitraan Jangka Panjang"
[pillar_04_desc]
other = "Kami membangun hubungan jangka panjang dengan klien, mendukung mereka melalui berbagai siklus proyek dan tinjauan risiko."


