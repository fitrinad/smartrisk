[service_01_title]
other = "Penilaian Risiko Operasional"
[service_01_desc]
other = "Identifikasi dan evaluasi sistematis bahaya operasional, termasuk studi HAZOP dan inspeksi teknis."

[service_02_title]
other = "Penilaian Risiko Proyek"
[service_02_desc]
other = "Analisis risiko menyeluruh untuk proyek modal, dari studi kelayakan hingga konstruksi dan <i lang='EN'>commissioning</i>."

[service_03_title]
other = "Valuasi Aset"
[service_03_desc]
other = "Valuasi teknis independen atas aset industri untuk asuransi, M&amp;A, dan kepatuhan regulasi."

[service_04_title]
other = "Pelatihan Manajemen Risiko"
[service_04_desc]
other = "Program pelatihan meliputi manajemen risiko perusahaan berdasarkan ISO 31000 dengan sertifikasi BNSP."

[service_05_title]
other = "Pelatihan K3"
[service_05_desc]
other = "Pelatihan dan uji kompetensi Kesehatan dan Keselamatan Kerja (K3) bersertifikat BNSP, untuk praktisi keselamatan di berbagai sektor industri Indonesia."

[service_06_title]
other = "Pelatihan Asuransi"
[service_06_desc]
other = "Pelatihan asuransi mencakup properti & interupsi bisnis, CAR, <i>liability</i>, <i>personal accident</i>, asuransi kapal, dan asuransi pengangkutan."


